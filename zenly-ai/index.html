<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenly AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#080808;
      color:#fff;
      font-family:'DM Sans',sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:40px 20px;
    }
    .container {
      max-width:420px;
      width:100%;
    }
    h1 {
      font-family:'Playfair Display',serif;
      font-size:52px;
      line-height:1.1;
      margin-bottom:16px;
    }
    p {
      color:#aaa;
      font-size:17px;
      line-height:1.5;
      margin-bottom:40px;
    }
    button {
      background:linear-gradient(135deg,#7FFFD4,#4fc3a1);
      color:#000;
      border:none;
      padding:16px 32px;
      font-size:17px;
      font-weight:700;
      border-radius:9999px;
      width:100%;
      margin-bottom:16px;
      cursor:pointer;
    }
    .back {
      background:transparent;
      border:1px solid #333;
      color:#ddd;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Zenly AI</h1>
    <p>The full interactive app is loading…</p>
    <button onclick="window.location.href='/'">← Back to Landing Page</button>
    <p style="font-size:13px;color:#555;">(Full app coming in next update — your Stripe redirect is already working!)</p>
  </div>
</body>
</html>
