<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenly AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    body {
      background:#080808;
      color:#fff;
      font-family:'DM Sans',sans-serif;
      min-height:100vh;
      padding:20px;
    }
    .header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }
    .logo {
      display:flex;
      align-items:center;
      gap:10px;
      font-size:28px;
      font-weight:900;
    }
    .tool-tabs {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      margin-bottom:30px;
    }
    .tool {
      background:#111;
      border-radius:12px;
      padding:16px 8px;
      text-align:center;
      border:2px solid transparent;
    }
    .tool.active {
      border-color:#7FFFD4;
      background:#0f1a14;
    }
    .chat-box {
      background:#111;
      border-radius:16px;
      height:420px;
      padding:20px;
      overflow-y:auto;
      margin-bottom:20px;
    }
    .input-area {
      display:flex;
      gap:10px;
    }
    input {
      flex:1;
      background:#1e1e1e;
      border:none;
      border-radius:9999px;
      padding:16px 20px;
      color:#fff;
      font-size:16px;
    }
    button {
      background:linear-gradient(135deg,#7FFFD4,#4fc3a1);
      color:#000;
      border:none;
      padding:0 28px;
      border-radius:9999px;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">✦ Zenly AI</div>
    <button onclick="window.location.href='/'" style="background:#222;color:#fff;padding:10px 20px;border-radius:9999px;border:none;">Back to Home</button>
  </div>

  <h1 style="font-family:'Playfair Display',serif;font-size:42px;text-align:center;margin-bottom:8px;">Zenly AI</h1>
  <p style="text-align:center;color:#7FFFD4;margin-bottom:30px;">Your daily assistant is ready</p>

  <div class="tool-tabs">
    <div class="tool active">✦ Ask</div>
    <div class="tool">✐ Write</div>
    <div class="tool">◈ Plan</div>
    <div class="tool">◎ Summarize</div>
  </div>

  <div class="chat-box">
    <p style="color:#666;text-align:center;margin-top:80px;">👋 Welcome to Zenly AI!<br><br>The full interactive experience is loading.<br><br>Try typing a message below 👇</p>
  </div>

  <div class="input-area">
    <input type="text" placeholder="Ask me anything..." id="input">
    <button onclick="sendFakeMessage()">Send</button>
  </div>

  <script>
    function sendFakeMessage() {
      const input = document.getElementById('input');
      if (input.value.trim()) {
        alert("✅ Message received! (Full AI chat coming in next update)");
        input.value = '';
      }
    }
  </script>
</body>
</html>
